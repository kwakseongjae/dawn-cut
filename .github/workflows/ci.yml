name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  verify:
    # macOS runner: PoC targets macOS; needs `say` for fixtures + ffmpeg.
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4

      # 버전은 package.json "packageManager"(pnpm@10.x)가 단일 진실원천.
      # 여기에 version을 또 지정하면 action-setup이 충돌로 즉사한다(6/2~6/10 CI 전멸 원인).
      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install deps
        run: pnpm install --frozen-lockfile

      - name: Install ffmpeg
        run: brew install ffmpeg

      - name: Lint + boundary + build + unit (always)
        run: |
          mkdir -p artifacts  # 증거 파일 출력 폴더(gitignore — fresh clone엔 없음; e2e도 사용)
          pnpm lint
          pnpm boundary
          pnpm build
          pnpm test:unit

      # whisper.cpp 빌드 + 모델(large-v3-turbo ~1.6GB)은 매 런 비용이 커서 캐싱한다.
      - name: Cache whisper build + model
        uses: actions/cache@v4
        with:
          path: vendor/whisper.cpp
          key: whisper-${{ runner.os }}-large-v3-turbo-v1

      - name: Setup binaries + fixture (integration)
        run: |
          brew install cmake
          pnpm setup:binaries
          pnpm make:fixture

      - name: Integration tests (real ffmpeg/whisper)
        # 가상화 러너의 Metal(Paravirtual)은 whisper GPU 경로가 조용히 빈 전사를 낸다 → CPU 강제.
        env:
          DAWN_WHISPER_NO_GPU: '1'
        run: pnpm test:int

      - name: E2E (Electron)
        run: |
          pnpm exec playwright install --with-deps chromium
          pnpm test:e2e

      - name: Upload gate evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: artifacts
          path: artifacts/
